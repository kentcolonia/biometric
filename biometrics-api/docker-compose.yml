version: '3.8'

services:
  biometrics-api:
    build: .
    ports:
      - "5000:5000"
    environment:
      DATABASE_URI: mysql+pymysql://root:password@db:3306/bio_api
    depends_on:
      - db
    restart: always

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: bio_api
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    restart: always

volumes:
  mysql_data: